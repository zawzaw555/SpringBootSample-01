<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>ResponseSample</title>
</head>
<body>
	<h1>ResponseSample</h1>
	<p th:if="${sample == null}" th:text="|ID ${id} のデータは見つかりません。|"></p>
	<table th:if="${sample != null}">
		<tr>
			<td>ID:</td>
			<td th:text="${sample.id}"></td>
		</tr>
		<tr>
			<td>文字:</td>
			<td th:text="${sample.str}"></td>
		</tr>
	</table>
</body>
</html>
