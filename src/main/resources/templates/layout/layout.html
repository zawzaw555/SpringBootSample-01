<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ulraq.net.nz/thymeleaf/layout">
<head>
<meta charset="UTF-8">
<meta name="viewpoit" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<!-- 共通CSS -->
<link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}">
<link rel="stylesheet" th:href="@{/css/layout.css}">
<!-- 共通JS -->
<script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}" defer></script>
<title>Layout</title>
</head>
<body>
	<!-- ヘッダー -->
	<nav layout:replace="~{layout/header::header-contents}"></nav>
	<!-- メニュー -->
	<div class="container-fluid">
		<div class="row">
			<nav class="col-sm-2 h-100 bg-light sidebar pt-2">
				<div class="bg-light" layout:insert="~{layout/menu::menu-contents}"></div>
			</nav>
		</div>
	</div>
	<!-- コンテンツ -->
	<div class="container-fluid">
		<div class="row">
			<div class="col-sm-10 offset-sm-2 main">
				<div layout:fragment="content"></div>
			</div>
		</div>
	</div>
</body>
</html>
